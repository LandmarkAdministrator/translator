# Spanish Language Configuration
# ISO 639-1 code: es

language:
  code: "es"
  name: "Spanish"
  native_name: "Espa\u00F1ol"

# Translation model settings
translation:
  # Helsinki-NLP Opus-MT model for English to Spanish
  model: "Helsinki-NLP/opus-mt-en-es"

  # Alternative models (in order of preference)
  fallback_models:
    - "Helsinki-NLP/opus-mt-tc-big-en-es"

# TTS (Text-to-Speech) settings
tts:
  # Piper voice model
  model: "es_ES-davefx-medium"

  # Voice download URL (Piper voices repository)
  model_url: "https://huggingface.co/rhasspy/piper-voices/resolve/main/es/es_ES/davefx/medium/es_ES-davefx-medium.onnx"
  config_url: "https://huggingface.co/rhasspy/piper-voices/resolve/main/es/es_ES/davefx/medium/es_ES-davefx-medium.onnx.json"

  # Speaker ID (for multi-speaker models, -1 for single speaker)
  speaker_id: -1

  # Speech rate adjustment (1.0 = normal)
  rate: 1.0

  # Alternative voices
  alternative_voices:
    - model: "es_ES-sharvard-medium"
      description: "Alternative male voice"
    - model: "es_MX-ald-medium"
      description: "Mexican Spanish male voice"

# Audio output settings
audio_output:
  # Device name or index (configured per preset)
  device: null

  # Sample rate (should match TTS output)
  sample_rate: 22050

  # Audio channels
  channels: 1
